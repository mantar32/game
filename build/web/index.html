import sys
import asyncio
import platform
import json
from pathlib import Path

# do not rename
async def custom_site():
    import embed
    platform.document.body.style.background = "#0d1b2a"

    platform.window.transfer.hidden = true
    platform.window.canvas.style.visibility = "visible"


    bundle = "dovus_web"

    # the C or js loader could do that but be explicit.
    appdir = Path(f"/data/data/{bundle}") # /data/data/dovus_web
    appdir.mkdir()


    # unpack filesystem from compressed archive into work dir
    if platform.window.location.host.find('.itch.zone')>0:
        import zipfile
        async with platform.fopen("dovus_web.apk", "rb") as archive:
            with zipfile.ZipFile(archive) as zip_ref:
                zip_ref.extractall(appdir.as_posix())
    else:
        import tarfile
        async with platform.fopen("dovus_web.tar.gz", "rb") as archive:
            tar = tarfile.open(fileobj=archive, mode="r:gz")
            tar.extractall(path=appdir.as_posix(), filter='tar')
            tar.close()

    # preloader will change to work dir and prepend it to sys.path
    platform.run_main(PyConfig, loaderhome= appdir / "assets", loadermain=None)


    # wait preloading complete : that includes images and wasm compilation of bundled modules
    while embed.counter()<0:
        await asyncio.sleep(.1)

    main = appdir / "assets" / "main.py"

    # start async top level machinery if not started and add a console in any case if requested.
    await TopLevel_async_handler.start_toplevel(platform.shell, console=window.python.config.debug)

    # now that apk is mounted we have access to font cache
    # but we need to fill __file__/__name__ that are not yet set
    __import__(__name__).__file__ = main


    def ui_callback(pkg):
        try:
            platform.window.setLoadingMessage(f"Hazirlaniyor: {pkg}")
        except Exception:
            platform.window.infobox.innerText = f"Hazirlaniyor: {pkg}"

    await shell.source(main, callback=ui_callback)

    # if you don't reach that step
    # your main.py has an infinite sync loop somewhere !

    platform.window.infobox.style.display = "none"
    platform.window.config.gui_divider = 1
    platform.window.window_resize()
    print("default.tmpl: done")

    shell.interactive()

asyncio.run( custom_site() )

function show_infobox() {

}

function force_fullscreen_canvas() {
    document.documentElement.style.setProperty("background", "#0d1b2a", "important");
    document.body.style.setProperty("background", "#0d1b2a", "important");

function fit_game_canvas() {
    const width = Math.max(1, Math.floor(window.visualViewport?.width || window.innerWidth || 1024));
    const height = Math.max(1, Math.floor(window.visualViewport?.height || window.innerHeight || 600));
    for (const id of ["canvas", "canvas3d"]) {
        const canvas = document.getElementById(id);
        if (!canvas) continue;
        canvas.width = 1024;
        canvas.height = 600;
        canvas.style.width = "100dvw";
        canvas.style.height = "100dvh";
    }
    if (globalThis.python?.config) {
        globalThis.python.config.fb_width = String(width);
        globalThis.python.config.fb_height = String(height);
        globalThis.python.config.fb_ar = width / height;
    }
    if (typeof window_resize === "function") {
        window_resize();
    }
    force_fullscreen_canvas();
    requestAnimationFrame(force_fullscreen_canvas);
}

window.addEventListener("resize", fit_game_canvas);
window.visualViewport?.addEventListener("resize", fit_game_canvas);
window.addEventListener("orientationchange", () => setTimeout(fit_game_canvas, 250));
setInterval(force_fullscreen_canvas, 500);

const touchKeyMap = {
    a: { key: "a", code: "KeyA", keyCode: 65 },
    d: { key: "d", code: "KeyD", keyCode: 68 },
    w: { key: "w", code: "KeyW", keyCode: 87 },
    j: { key: "j", code: "KeyJ", keyCode: 74 },
    k: { key: "k", code: "KeyK", keyCode: 75 },
    l: { key: "l", code: "KeyL", keyCode: 76 },
    u: { key: "u", code: "KeyU", keyCode: 85 },
    enter: { key: "Enter", code: "Enter", keyCode: 13 },
};

const activeTouchKeys = new Set();
const actionTouchKeys = new Set(["j", "k", "l", "u"]);
globalThis.dovus_keys = globalThis.dovus_keys || Object.create(null);
globalThis.dovus_start = false;
globalThis.dovus_restart = false;
globalThis.__dovus_keys = globalThis.__dovus_keys || Object.create(null);
globalThis.__dovus_start = false;
globalThis.__dovus_restart = false;
globalThis.dovus_state = "MENU";
globalThis.dovus_player_dead = false;
globalThis.dovus_game_over = false;
globalThis.dovus_p1_won = false;
globalThis.dovus_p1_dead = false;
globalThis.dovus_p2_dead = false;
globalThis.dovus_restart_ready = false;
globalThis.dovus_match_id = 0;
globalThis.dovus_home = false;
globalThis.__dovus_home = false;
globalThis.dovus_character = globalThis.dovus_character || "Fighter";

const characterCatalog = {
    Fighter: { label: "FIGHTER", role: "DENGELI", price: 0 },
    Shinobi: { label: "SHINOBI", role: "HIZLI", price: 80 },
    Samurai: { label: "SAMURAI", role: "GUCLU", price: 140 },
    Gotoku: { label: "GOTOKU", role: "HAYALET", price: 180 },
    Onre: { label: "ONRE", role: "UCUCU", price: 220 },
    Yurei: { label: "YUREI", role: "EFSUNLU", price: 260 },
    Converted_Vampire: { label: "VAMPIR", role: "DENGELI", price: 300 },
    Countess_Vampire: { label: "KONTES", role: "BUYU", price: 340 },
    Vampire_Girl: { label: "VAMP GIRL", role: "ATIK", price: 380 },
    Satyr_1: { label: "SATYR I", role: "HIZLI", price: 420 },
    Satyr_2: { label: "SATYR II", role: "GUCLU", price: 460 },
    Satyr_3: { label: "SATYR III", role: "BUYUCU", price: 500 },
};
const STARTING_COINS = 80;
const WIN_REWARD = 20;
const DEATH_PENALTY = 5;
const storageKeys = {
    coins: "dovus_coins",
    unlocked: "dovus_unlocked",
    rewardedMatch: "dovus_rewarded_match",
};

function readStoredNumber(key, fallback) {
    try {
        const value = Number(localStorage.getItem(key));
        return Number.isFinite(value) ? value : fallback;
    } catch {
        return fallback;
    }
}

function readUnlockedCharacters() {
    try {
        const stored = JSON.parse(localStorage.getItem(storageKeys.unlocked) || "[]");
        const values = Array.isArray(stored) ? stored : [];
        return Array.from(new Set(["Fighter", ...values.filter((name) => characterCatalog[name])]));
    } catch {
        return ["Fighter"];
    }
}

globalThis.dovus_coins = readStoredNumber(storageKeys.coins, STARTING_COINS);
globalThis.dovus_unlocked = readUnlockedCharacters();
let lastSettledMatch = readStoredNumber(storageKeys.rewardedMatch, 0);

function saveEconomy() {
    try {
        localStorage.setItem(storageKeys.coins, String(globalThis.dovus_coins));
        localStorage.setItem(storageKeys.unlocked, JSON.stringify(globalThis.dovus_unlocked));
        localStorage.setItem(storageKeys.rewardedMatch, String(lastSettledMatch));
    } catch {
        // localStorage kapaliysa oyun yine calisir, sadece satin alma kalici olmaz.
    }
}

function ownsCharacter(character) {
    return globalThis.dovus_unlocked.includes(character);
}

function emitKeyboard(type, keyName) {
    const spec = touchKeyMap[keyName];
    if (!spec) return;
    const event = new KeyboardEvent(type, {
        key: spec.key,
        code: spec.code,
        bubbles: true,
        cancelable: true,
        repeat: false,
    });
    Object.defineProperty(event, "keyCode", { get: () => spec.keyCode });
    Object.defineProperty(event, "which", { get: () => spec.keyCode });
    const canvas = document.getElementById("canvas");
    canvas?.focus();
    canvas?.dispatchEvent(event);
    document.dispatchEvent(event);
    window.dispatchEvent(event);
}

function tapStartKey() {
    globalThis.dovus_start = true;
    globalThis.__dovus_start = true;
    emitKeyboard("keydown", "enter");
    emitKeyboard("keyup", "enter");
}

function setWalletMessage(message) {
    const walletMessage = document.getElementById("wallet-message");
    if (walletMessage) walletMessage.textContent = message || "";
}

function renderEconomyUI(message = "") {
    const coinCount = document.getElementById("coin-count");
    if (coinCount) coinCount.textContent = String(globalThis.dovus_coins);
    setWalletMessage(message);
    document.querySelectorAll(".character-button").forEach((button) => {
        const character = button.dataset.character;
        const catalog = characterCatalog[character];
        if (!catalog) return;
        const owned = ownsCharacter(character);
        const selected = globalThis.dovus_character === character;
        button.classList.toggle("is-selected", selected);
        button.classList.toggle("is-locked", !owned);
        button.setAttribute("aria-pressed", selected ? "true" : "false");
        const small = button.querySelector("small");
        if (small) small.textContent = owned ? catalog.role : `${catalog.price} COIN`;
    });
}

function settleMatchEconomy() {
    const matchId = Number(globalThis.dovus_match_id || 0);
    if (
        globalThis.dovus_state === "GAME_OVER" &&
        matchId > 0 &&
        matchId !== lastSettledMatch
    ) {
        let message = "";
        if (globalThis.dovus_p1_won) {
            globalThis.dovus_coins += WIN_REWARD;
            message = `Round kazandin: +${WIN_REWARD} coin`;
        } else if (globalThis.dovus_p1_dead) {
            globalThis.dovus_coins = Math.max(0, globalThis.dovus_coins - DEATH_PENALTY);
            message = `Oldun: -${DEATH_PENALTY} coin`;
        }
        lastSettledMatch = matchId;
        saveEconomy();
        renderEconomyUI(message);
    }
}

function startFightFromButton() {
    if (globalThis.dovus_state !== "MENU") return;
    if (!ownsCharacter(globalThis.dovus_character)) {
        globalThis.dovus_character = "Fighter";
        renderEconomyUI("Kilitli karakter secilemez.");
        return;
    }
    globalThis.dovus_start = true;
    globalThis.__dovus_start = true;
    globalThis.dovus_state = "STARTING";
    const startButton = document.getElementById("start-button");
    if (startButton) startButton.hidden = true;
    const characterSelect = document.getElementById("character-select");
    if (characterSelect) characterSelect.hidden = true;
    tapStartKey();
}

function selectCharacter(character) {
    const catalog = characterCatalog[character];
    if (!catalog) return;
    let message = "";
    if (!ownsCharacter(character)) {
        if (globalThis.dovus_coins < catalog.price) {
            renderEconomyUI(`${catalog.label} icin ${catalog.price} coin lazim.`);
            return;
        }
        globalThis.dovus_coins -= catalog.price;
        globalThis.dovus_unlocked.push(character);
        saveEconomy();
        message = `${catalog.label} satin alindi.`;
    }
    globalThis.dovus_character = character;
    renderEconomyUI(message);
}

function pressTouchKey(button) {
    const keyName = button.dataset.key;
    if (!keyName || activeTouchKeys.has(keyName)) return;
    if (actionTouchKeys.has(keyName)) {
        for (const otherKey of actionTouchKeys) {
            if (otherKey === keyName) continue;
            activeTouchKeys.delete(otherKey);
            globalThis.dovus_keys[otherKey] = false;
            globalThis.__dovus_keys[otherKey] = false;
            document.querySelector(`.touch-button[data-key="${otherKey}"]`)?.classList.remove("is-down");
            emitKeyboard("keyup", otherKey);
        }
    }
    // tapStartKey kaldirildi - dovus sirasinda start tetiklememeli
    activeTouchKeys.add(keyName);
    globalThis.dovus_keys[keyName] = true;
    globalThis.__dovus_keys[keyName] = true;
    button.classList.add("is-down");
    emitKeyboard("keydown", keyName);
}

function releaseTouchKey(button) {
    const keyName = button.dataset.key;
    if (!keyName || !activeTouchKeys.has(keyName)) return;
    activeTouchKeys.delete(keyName);
    globalThis.dovus_keys[keyName] = false;
    globalThis.__dovus_keys[keyName] = false;
    button.classList.remove("is-down");
    emitKeyboard("keyup", keyName);
}

function releaseAllTouchKeys() {
    document.querySelectorAll(".touch-button.is-down").forEach(releaseTouchKey);
    for (const keyName of Array.from(activeTouchKeys)) {
        activeTouchKeys.delete(keyName);
        globalThis.dovus_keys[keyName] = false;
        globalThis.__dovus_keys[keyName] = false;
        emitKeyboard("keyup", keyName);
    }
}

function restartFight() {
    globalThis.dovus_restart = true;
    globalThis.__dovus_restart = true;
    globalThis.dovus_state = "RESTARTING";
    globalThis.dovus_restart_ready = false;
    releaseAllTouchKeys();
    updateRestartButton();
}

function goHome() {
    globalThis.dovus_home = true;
    globalThis.__dovus_home = true;
    globalThis.dovus_state = "MENU";
    globalThis.dovus_player_dead = false;
    globalThis.dovus_game_over = false;
    globalThis.dovus_p1_dead = false;
    globalThis.dovus_p2_dead = false;
    globalThis.dovus_restart_ready = false;
    releaseAllTouchKeys();
    renderEconomyUI();
    updateRestartButton();
}

function updateRestartButton() {
    settleMatchEconomy();
    const isMenu = globalThis.dovus_state === "MENU";
    const startButton = document.getElementById("start-button");
    if (startButton) {
        startButton.hidden = !isMenu;
    }
    const walletPanel = document.getElementById("wallet-panel");
    if (walletPanel) {
        walletPanel.hidden = !isMenu;
    }
    const characterSelect = document.getElementById("character-select");
    if (characterSelect) {
        characterSelect.hidden = !isMenu;
    }
    const touchControls = document.getElementById("touch-controls");
    if (touchControls) {
        touchControls.hidden = globalThis.dovus_state !== "FIGHT";
    }
    const shouldShowEndActions = Boolean(
        globalThis.dovus_restart_ready &&
        (
            globalThis.dovus_game_over ||
            globalThis.dovus_player_dead ||
            globalThis.dovus_p1_dead ||
            globalThis.dovus_p2_dead ||
            globalThis.dovus_state === "GAME_OVER" ||
            globalThis.dovus_state === "ROUND_END"
        )
    );
    const button = document.getElementById("restart-button");
    if (button) {
        button.hidden = !shouldShowEndActions;
        button.style.display = shouldShowEndActions ? "block" : "";
    }
    const homeButton = document.getElementById("home-button");
    if (homeButton) {
        homeButton.hidden = !shouldShowEndActions;
        homeButton.style.display = shouldShowEndActions ? "block" : "";
    }
}

function setupTouchKeyboard() {
    document.querySelectorAll(".touch-button").forEach((button) => {
        button.addEventListener("pointerdown", (event) => {
            event.preventDefault();
            button.setPointerCapture?.(event.pointerId);
            pressTouchKey(button);
        });
        button.addEventListener("pointerup", (event) => {
            event.preventDefault();
            releaseTouchKey(button);
        });
        button.addEventListener("pointercancel", (event) => {
            event.preventDefault();
            releaseTouchKey(button);
        });
        button.addEventListener("lostpointercapture", () => releaseTouchKey(button));
        button.addEventListener("touchstart", (event) => {
            event.preventDefault();
            pressTouchKey(button);
        }, { passive: false });
        button.addEventListener("touchend", (event) => {
            event.preventDefault();
            releaseTouchKey(button);
        }, { passive: false });
        button.addEventListener("touchcancel", (event) => {
            event.preventDefault();
            releaseTouchKey(button);
        }, { passive: false });
        button.addEventListener("mousedown", (event) => {
            event.preventDefault();
            pressTouchKey(button);
        });
        button.addEventListener("mouseup", (event) => {
            event.preventDefault();
            releaseTouchKey(button);
        });
        button.addEventListener("mouseleave", () => releaseTouchKey(button));
        button.addEventListener("contextmenu", (event) => event.preventDefault());
    });
    const restartButton = document.getElementById("restart-button");
    restartButton?.addEventListener("pointerdown", (event) => {
        event.preventDefault();
        event.stopPropagation();
        restartFight();
    });
    restartButton?.addEventListener("touchstart", (event) => {
        event.preventDefault();
        event.stopPropagation();
        restartFight();
    }, { passive: false });
    restartButton?.addEventListener("click", (event) => {
        event.preventDefault();
        event.stopPropagation();
        restartFight();
    });
    const homeButton = document.getElementById("home-button");
    homeButton?.addEventListener("pointerdown", (event) => {
        event.preventDefault();
        event.stopPropagation();
        goHome();
    });
    homeButton?.addEventListener("touchstart", (event) => {
        event.preventDefault();
        event.stopPropagation();
        goHome();
    }, { passive: false });
    homeButton?.addEventListener("click", (event) => {
        event.preventDefault();
        event.stopPropagation();
        goHome();
    });
    const startButton = document.getElementById("start-button");
    startButton?.addEventListener("pointerdown", (event) => {
        event.preventDefault();
        startFightFromButton();
    });
    startButton?.addEventListener("touchstart", (event) => {
        event.preventDefault();
        startFightFromButton();
    }, { passive: false });
    startButton?.addEventListener("click", (event) => {
        event.preventDefault();
        startFightFromButton();
    });
    document.querySelectorAll(".character-button").forEach((button) => {
        const choose = (event) => {
            event.preventDefault();
            selectCharacter(button.dataset.character);
        };
        button.addEventListener("pointerdown", choose);
        button.addEventListener("touchstart", choose, { passive: false });
        button.addEventListener("click", choose);
    });
    if (!ownsCharacter(globalThis.dovus_character)) {
        globalThis.dovus_character = "Fighter";
    }
    renderEconomyUI();
    updateRestartButton();
}

window.addEventListener("blur", releaseAllTouchKeys);
document.addEventListener("visibilitychange", () => {
    if (document.hidden) releaseAllTouchKeys();
});
window.addEventListener("DOMContentLoaded", setupTouchKeyboard);
setInterval(updateRestartButton, 120);

</script>

        document.getElementById("info").innerHTML = data
    }

    function info_online(url) {
        // display info about current APK
        fetch( url /*, options */)
            .then((response) => response.text())
            .then((html) => {
                info_inline(html);
        })
        .catch((error) => {
            console.warn(error);
        });
